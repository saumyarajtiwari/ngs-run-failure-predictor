version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    volumes:
      - ./models:/app/models
      - ./data:/app/data

  dashboard:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
